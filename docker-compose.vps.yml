services:
  backend:
    build:
      context: ./OpenRestoApi
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - PORT=8080
      - CORS_ORIGINS=https://${DOMAIN_NAME}
    volumes:
      - ./data:/data:Z
    restart: always

  frontend:
    build:
      context: ./openresto-frontend
      dockerfile: Dockerfile
      args:
        - EXPO_PUBLIC_API_URL=/api
    environment:
      - EXPO_PUBLIC_API_URL=/api
    restart: always

  reverse-proxy:
    build:
      context: ./nginx-vps
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - BACKEND_HOST=backend
      - BACKEND_PORT=8080
      - FRONTEND_HOST=frontend
      - FRONTEND_PORT=8081
    volumes:
      - ./ssl/server.crt:/etc/nginx/ssl/server.crt:ro,Z
      - ./ssl/server.key:/etc/nginx/ssl/server.key:ro,Z
    depends_on:
      - backend
      - frontend
    restart: always
