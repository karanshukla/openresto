events {}

http {
  server_tokens off;

  server {
    listen 80;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Block access to hidden files and sensitive directories
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
        error_page 403 = @error_plain;
    }

    # Proactive protection against common probes
    location ~* \.(env|git|htaccess|ssh|svn|hg|bzr|darcs|php|aspx|jsp|cgi)$ {
        deny all;
        access_log off;
        log_not_found off;
        error_page 403 = @error_plain;
    }

    location @error_plain {
        return 403 "Forbidden";
        default_type text/plain;
    }

    location /api/ {
      proxy_pass http://backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header X-Powered-By;
      proxy_hide_header Server;
    }

    location / {
      proxy_pass http://frontend:8081;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header X-Powered-By;
      proxy_hide_header Server;
    }
  }
}
