name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openresto-frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: openresto-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Check
        run: npx prettier --check "**/*.{ts,tsx,js,json}"

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test -- --ci --coverage --forceExit

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Tests with Coverage
        run: >
          dotnet test --no-build --configuration Release --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/TestResults/**/coverage.cobertura.xml"

      - name: Coverage Summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/coverage.cobertura.xml"
          badge: true
          format: markdown
          output: both

      - name: Add Coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: code-coverage-results.md

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build all containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          # Max wait 3 minutes (90 * 2s)
          for i in $(seq 1 90); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5062/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready (HTTP 200)!"
              exit 0
            fi
            
            # Check if any container has exited
            if [ $(docker compose ps | grep -c "Exited") -gt 0 ]; then
              echo "Error: One or more containers have exited!"
              docker compose ps
              docker compose logs
              exit 1
            fi
            
            echo "Attempt $i/90: Backend not ready yet (HTTP $STATUS)..."
            # Optional: show container status every 5 attempts
            if [ $((i % 5)) -eq 0 ]; then
              docker compose ps
            fi
            sleep 2
          done
          echo "Error: Services failed to become ready after 180 seconds."
          docker compose ps
          docker compose logs
          exit 1

      - name: Verify backend responds via nginx
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5062/api/health)
          echo "GET /api/health -> $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Verify frontend responds via nginx
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5062/)
          echo "GET / -> $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Verify security headers present
        run: |
          HEADERS=$(curl -sD - -o /dev/null http://localhost:5062/api/health)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-content-type-options: nosniff" || exit 1
          echo "$HEADERS" | grep -qi "x-frame-options: DENY" || exit 1

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: http://localhost:5062/api/health
          rules_file_name: .zap-rules.tsv
          cmd_options: >
            -a
            -j
            -l WARN
            -z "-config api.disablekey=true
            -config spider.maxDuration=2
            -config scanner.maxScanDurationInMins=5"
          allow_issue_writing: false
          fail_action: true

      - name: Show ZAP vulnerabilities
        if: failure()
        run: |
          if [ -f report_md.md ]; then
            cat report_md.md
            cat report_md.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No markdown report found."
          fi

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_md.md
          if-no-files-found: ignore

      - name: Setup Node.js (for E2E)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: openresto-frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: openresto-frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: openresto-frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        working-directory: openresto-frontend
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: openresto-frontend/playwright-report/
          retention-days: 30

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs
