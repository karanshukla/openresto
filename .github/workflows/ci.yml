name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openresto-frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: openresto-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Check
        run: npx prettier --check "**/*.{ts,tsx,js,json}"

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test -- --ci --coverage --forceExit

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Tests with Coverage
        run: >
          dotnet test --no-build --configuration Release --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/TestResults/**/coverage.cobertura.xml"

      - name: Coverage Summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/coverage.cobertura.xml"
          badge: true
          format: markdown
          output: both

      - name: Add Coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: code-coverage-results.md

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build all containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5062/api/brand > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: Verify backend responds via nginx
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5062/api/brand)
          echo "GET /api/brand -> $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Verify frontend responds via nginx
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5062/)
          echo "GET / -> $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Verify security headers present
        run: |
          HEADERS=$(curl -sI http://localhost:5062/api/brand)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-content-type-options: nosniff" || exit 1
          echo "$HEADERS" | grep -qi "x-frame-options: DENY" || exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs
