services:
  backend:
    build:
      context: ./OpenRestoApi
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - PORT=8080
      - CORS_ORIGINS=http://localhost:5062
    env_file:
      - ./OpenRestoApi/.env.docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./openresto-frontend
      dockerfile: Dockerfile

  reverse-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "5062:80"
    environment:
      - PORT=80
      - BACKEND_HOST=backend
      - BACKEND_PORT=8080
      - FRONTEND_HOST=frontend
      - FRONTEND_PORT=8081
    depends_on:
      - backend
      - frontend
