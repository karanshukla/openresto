version: "3.8"

services:
  backend:
    build:
      context: ./OpenRestoApi
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - CORS_ORIGINS=http://localhost:5062
    env_file:
      - ./OpenRestoApi/.env.docker

  frontend:
    build:
      context: ./openresto-frontend
      dockerfile: Dockerfile

  reverse-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "5062:80"
    environment:
      - PORT=80
      - BACKEND_HOST=backend
      - BACKEND_PORT=8080
      - FRONTEND_HOST=frontend
      - FRONTEND_PORT=8081
    depends_on:
      - backend
      - frontend
