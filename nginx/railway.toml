[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.variables]
BACKEND_HOST = "OpenRestoApi.railway.internal"
BACKEND_PORT = "${{OpenRestoApi.PORT}}"
FRONTEND_HOST = "openresto-frontend.railway.internal"
FRONTEND_PORT = "${{openresto-frontend.PORT}}"
